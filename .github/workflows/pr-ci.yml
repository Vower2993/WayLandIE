name: PR CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - name: Standard
            artifactName: apk-standard
            gradleTask: assembleStandardDebug
            apkPath: app/build/outputs/apk/standard/debug/standard.apk
          - name: Ludashi
            artifactName: apk-ludashi
            gradleTask: assembleLudashiDebug
            apkPath: app/build/outputs/apk/ludashi/debug/ludashi.apk
          - name: Pubg
            artifactName: apk-pubg
            gradleTask: assemblePubgDebug
            apkPath: app/build/outputs/apk/pubg/debug/pubg.apk

    steps:
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1
        persist-credentials: false

    - name: Download LFS assets from WinNative release
      run: |
        # Download the LFS-tracked files that we couldn't push via git
        # These are large binary files from WinNative's repo
        pip install huggingface_hub 2>/dev/null || true
        
        # Try to download from WinNative's GitHub LFS
        cd app/src/main/assets
        
        # proton-9.0-arm64ec.txz (64MB)
        if [ -f proton-9.0-arm64ec.txz ] && head -1 proton-9.0-arm64ec.txz | grep -q "DOWNLOAD_FROM_CI"; then
          echo "Downloading proton-9.0-arm64ec.txz from WinNative repo..."
          curl -sL "https://github.com/WinNative-Emu/WinNative/raw/main/app/src/main/assets/proton-9.0-arm64ec.txz" -o proton-9.0-arm64ec.txz || true
          # If still a pointer, try the LFS media endpoint
          if head -1 proton-9.0-arm64ec.txz | grep -q "version https://git-lfs"; then
            echo "LFS pointer detected, trying media endpoint..."
            curl -sL "https://media.githubusercontent.com/media/WinNative-Emu/WinNative/main/app/src/main/assets/proton-9.0-arm64ec.txz" -o proton-9.0-arm64ec.txz || true
          fi
          echo "proton size: $(wc -c < proton-9.0-arm64ec.txz)"
        fi
        
        # imagefs.tzst (large)
        if [ -f imagefs.tzst ] && head -1 imagefs.tzst | grep -q "DOWNLOAD_FROM_CI"; then
          echo "Downloading imagefs.tzst from WinNative repo..."
          curl -sL "https://media.githubusercontent.com/media/WinNative-Emu/WinNative/main/app/src/main/assets/imagefs.tzst" -o imagefs.tzst || true
          echo "imagefs size: $(wc -c < imagefs.tzst)"
        fi

    - name: Cache NDK build outputs
      uses: actions/cache@v5
      with:
        path: |
          app/.cxx
          app/build/intermediates/cxx
        key: ndk-${{ matrix.flavor.name }}-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle', 'app/src/main/cpp/CMakeLists.txt') }}
        restore-keys: |
          ndk-${{ matrix.flavor.name }}-
          ndk-

    - name: Install meson + ninja + wayland-scanner deps
      run: |
        sudo apt-get install -y -qq meson ninja-build libwayland-bin wayland-protocols libffi-dev libexpat1-dev pkg-config
        pip3 install --user meson 2>/dev/null || true

    - name: Cache bionic-bridge deps
      uses: actions/cache@v5
      with:
        path: app/src/main/cpp/bionic-libs
        key: bionic-libs-v2-${{ hashFiles('tools/build-bionic-bridge.sh') }}
        restore-keys: bionic-libs-v2-

    - name: Build bionic-bridge deps (libffi + libwayland-server)
      if: steps.cache-bionic-libs.outputs.cache-hit != 'true'
      run: |
        if [ ! -d app/src/main/cpp/bionic-libs/lib ] || [ ! -f app/src/main/cpp/bionic-libs/lib/libwayland-server.a ]; then
          export ANDROID_HOME=${{ env.ANDROID_HOME }}
          export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
          export NDK_ROOT=$ANDROID_NDK_HOME
          bash tools/build-bionic-bridge.sh
        fi

    - name: Build winewayland driver (winewayland.drv + winewayland.so + ntdll.dll + FEXCore DLL)
      run: |
        export ANDROID_HOME=${{ env.ANDROID_HOME }}
        export ANDROID_NDK_HOME=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | head -1)
        export WORKSPACE=${{ github.workspace }}
        bash .github/scripts/build-winewayland-driver.sh || echo "WARNING: winewayland driver build failed"

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Rust Android target
      run: rustup target add aarch64-linux-android

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        validate-wrappers: true
        cache-cleanup: 'on-success'

    - name: Decode keystore and build
      timeout-minutes: 15
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        GRADLE_OPTS: -Xmx4g -XX:+UseG1GC
      run: |
        export KEYSTORE_FILE="${{ github.workspace }}/release.jks"
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
        else
          export KEYSTORE_PASSWORD="dummypass"
          export KEY_ALIAS="winnative"
          export KEY_PASSWORD="dummypass"
          keytool -genkey -v \
            -keystore "$KEYSTORE_FILE" \
            -alias winnative \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass dummypass -keypass dummypass \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"
        fi
        ./gradlew :app:${{ matrix.flavor.gradleTask }} --build-cache --parallel -x lint

    - name: Compute artifact label
      id: label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          short_sha=$(printf '%s' "${{ github.event.pull_request.head.sha }}" | cut -c1-5)
          echo "name=PR#${{ github.event.pull_request.number }}-${short_sha}" >> "$GITHUB_OUTPUT"
        else
          short_sha=$(printf '%s' "$GITHUB_SHA" | cut -c1-5)
          # For merged PR commits on main, preserve the source PR number and PR head SHA.
          num=$(git log -1 --pretty=%s | grep -oE '\(#[0-9]+\)|#[0-9]+' | tail -1 | tr -cd '0-9')
          if [ -n "$num" ]; then
            pr_head_sha=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$num" --jq '.head.sha' 2>/dev/null || true)
            if [ -n "$pr_head_sha" ] && [ "$pr_head_sha" != "null" ]; then
              short_sha=$(printf '%s' "$pr_head_sha" | cut -c1-5)
            fi
            echo "name=PR#${num}-${short_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "name=main-${short_sha}" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Prepare APK for upload
      run: |
        upload_dir="artifacts/${{ matrix.flavor.artifactName }}"
        mkdir -p "$upload_dir"
        cp ${{ matrix.flavor.apkPath }} "$upload_dir/WinNative-Debug-${{ matrix.flavor.name }}-${{ steps.label.outputs.name }}.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.flavor.artifactName }}
        path: artifacts/${{ matrix.flavor.artifactName }}/*.apk
        retention-days: 7
        if-no-files-found: error

  cleanup-caches:
    needs: build
    if: ${{ always() && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
    - name: Cleanup duplicate caches
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh cache list --repo "$GITHUB_REPOSITORY" --json id,key,createdAt --limit 100 |
          jq -r '
            group_by(.key | sub("-[a-f0-9]{20,}$"; ""))
            | .[]
            | sort_by(.createdAt) | reverse
            | .[1:][]
            | .id
          ' |
          xargs -I {} gh cache delete {} --repo "$GITHUB_REPOSITORY" || true
